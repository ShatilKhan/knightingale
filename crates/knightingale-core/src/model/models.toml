# Catalog of supported local Whisper models.
#
# Aliases let `knightingale model list` and `model recommend` print useful
# tables. There is no auto-download — that's an Ollama-class feature.
#
# To install a model:
#   1. Pick an alias from `knightingale model list`.
#   2. Run `knightingale model where <alias>` to get the curl command.
#   3. curl the file into `~/.cache/knightingale/models/` (or anywhere).
#   4. Set `KNIGHTINGALE_MODEL_PATH=<file>` in `~/.config/knightingale/.env`
#      (or edit `config.toml`).
#
# URLs point at the canonical ggerganov / distil-whisper GGUF files on
# Hugging Face. Sizes are Q5_1 quantization unless noted.

[[model]]
alias = "tiny.en"
filename = "ggml-tiny.en-q5_1.bin"
url = "https://huggingface.co/ggerganov/whisper.cpp/resolve/main/ggml-tiny.en-q5_1.bin"
size_mb = 32
vram_mb = 200
language = "en"
recommended_for = "very weak hardware, smoke test"

