# Catalog of supported local Whisper models.
#
# Aliases let `knightingale model list` / `recommend` / `where` print useful
# tables and download instructions. There is no auto-download — that's an
# Ollama-class feature.
#
#   1. Pick an alias with `knightingale model list` or `recommend`.
#   2. Run `knightingale model where <alias>` to print the curl command.
#   3. Run that curl line.
#   4. Set `KNIGHTINGALE_MODEL_PATH=<path>` in `~/.config/knightingale/.env`.
#
# URLs point at the canonical GGUF files published by the whisper.cpp project
# on Hugging Face. Quantization noted in the filename (Q5_0 for the larger
# multilingual checkpoints, Q5_1 for tiny/base/small variants).

[[model]]
alias = "tiny.en"
filename = "ggml-tiny.en-q5_1.bin"
url = "https://huggingface.co/ggerganov/whisper.cpp/resolve/main/ggml-tiny.en-q5_1.bin"
size_mb = 32
vram_mb = 200
language = "en"
recommended_for = "smoke test, very weak hardware"

