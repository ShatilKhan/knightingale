sha256 = "c77c5a2c6d7d827b9112d1ce0c1c5b3a0c4b8e9c1c1c1c1c1c1c1c1c1c1c1c1c"
size_mb = 32
vram_mb = 200
language = "en"
recommended_for = "very weak hardware, smoke test"

