# Speaches — OpenAI-compatible whisper.cpp / faster-whisper server.
#
#   docker compose up -d
#
# Then point Knightingale at it:
#   KNIGHTINGALE_PROVIDER=custom
#   CUSTOM_BASE_URL=http://localhost:8000/v1
#   CUSTOM_API_KEY=anything
#   CUSTOM_MODEL=Systran/faster-whisper-large-v3

services:
  speaches:
    image: ghcr.io/speaches-ai/speaches:latest-cuda
    container_name: speaches
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - speaches-cache:/home/ubuntu/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  speaches-cache:
